<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
    }
    .dot.ok { background: #22c55e; }
    .dot.err { background: #ef4444; }
    .field { margin-bottom: 10px; }
    .field label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field input {
      width: 100%;
      padding: 8px 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      font-family: 'Consolas', 'Courier New', monospace;
      outline: none;
    }
    .field input:focus { border-color: #6366f1; }
    .field input::placeholder { color: #555; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-secondary {
      background: transparent;
      border: 1px solid #333;
      color: #aaa;
      margin-top: 6px;
    }
    .status {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 11px;
      line-height: 1.4;
      display: none;
    }
    .status.ok { display: block; background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .status.err { display: block; background: #2a0a0a; color: #f87171; border: 1px solid #7f1d1d; }
    .status.info { display: block; background: #1a1a2e; color: #93c5fd; border: 1px solid #1e3a5f; }
    .divider { border-top: 1px solid #222; margin: 12px 0; }
    .meta {
      font-size: 10px;
      color: #555;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot" id="statusDot"></div>
    <h1>StalkFun Auth Sync</h1>
  </div>

  <div class="field">
    <label>Server URL</label>
    <input type="text" id="serverUrl" placeholder="https://your-server.com or http://localhost:3001">
  </div>
  <div class="field">
    <label>Reload API Key</label>
    <input type="password" id="apiKey" placeholder="From .auth-reload-key file">
  </div>

  <div class="divider"></div>

  <button class="btn btn-primary" id="syncBtn">Grab Cookies & Push to Server</button>
  <button class="btn btn-secondary" id="saveBtn">Save Settings</button>

  <div class="status" id="status"></div>
  <div class="meta" id="meta"></div>

  <script src="popup.js"></script>
</body>
</html>
